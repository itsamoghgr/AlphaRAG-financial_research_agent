services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: alpharag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alpharag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alpharag}
      POSTGRES_DB: ${POSTGRES_DB:-alpharag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alpharag} -d ${POSTGRES_DB:-alpharag}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    driver: local
