# AlphaRAG eval set.
#
# Each entry has:
#   ticker:                Ticker the question is about
#   question:              The user's question
#   expected_section_keywords:
#                          Keywords/phrases that should appear in the title of
#                          AT LEAST ONE retrieved chunk's section. Used to
#                          score retrieval recall@k. Case-insensitive substring.
#   expected_answer_contains:
#                          Phrases the final answer SHOULD contain (any of).
#                          Used as a coarse correctness signal in addition to
#                          the LLM-as-judge score.
#   form_types:
#                          Optional whitelist of acceptable form types for the
#                          retrieved evidence (default: any).
#
# Hand-labeled. Calibrated against the 5 demo tickers (AAPL, MSFT, GOOGL,
# NVDA, TSLA). Five questions each, ranging from factual (MD&A) to
# qualitative (Risk Factors). Expand here as we add tickers.

- ticker: AAPL
  question: What does Apple identify as its principal risk factors?
  expected_section_keywords: ["Risk Factors"]
  expected_answer_contains: ["risk", "supply"]

- ticker: AAPL
  question: How does Apple describe its business segments?
  expected_section_keywords: ["Business"]
  expected_answer_contains: ["iPhone", "Services"]

- ticker: AAPL
  question: What does management discuss about gross margin trends?
  expected_section_keywords: ["Management's Discussion", "MD&A"]
  expected_answer_contains: ["margin"]

- ticker: AAPL
  question: How does Apple characterize its supply chain concentration?
  expected_section_keywords: ["Risk Factors", "Business"]
  expected_answer_contains: ["China", "manufacturer", "manufacturing", "concentrat"]

- ticker: AAPL
  question: What legal proceedings does Apple disclose?
  expected_section_keywords: ["Legal Proceedings"]
  expected_answer_contains: ["proceeding", "litigation"]

